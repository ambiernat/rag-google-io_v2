# =====================================================
# Evaluation configuration (sparse + dense)
# =====================================================
# evaluation/config.yaml

qdrant:
  url: "http://localhost:6333"

collections:
  sparse:
    name: "google-io-transcripts-sparse"
    schema_version: "v1"
  
  dense:
    name: "google-io-transcripts-dense"
    schema_version: "v1"

evaluation:
  ground_truth_dir: "data/eval/dev"
  ground_truth_file: "multi_doc.json"
  output_dir: "data/eval/results"

  top_k: 5

paraphrase_gt:
  ground_truth_dir: "data/eval/ground_truth"
  ground_truth_prefix: "gt_gpt-5-nano_synthetic"
  output_dir: "data/eval/ground_truth"
  top_k: 5

enrich_gt:
  ground_truth_dir: "data/eval/ground_truth"
  ground_truth_prefix: "gt_gpt-5-nano_paraphrased"
  output_dir: "data/eval/ground_truth"
  top_k: 5