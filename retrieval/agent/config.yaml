# retrieval/agent/config.yaml
# Configuration for the agentic retrieval layer.

query_rewriter:
  model: "gpt-4o-mini"
  num_variants: 3
  max_tokens: 512

self_evaluator:
  model: "gpt-4o-mini"
  max_completion_tokens: 1024
  text_preview_chars: 300   # chars of chunk text shown to the model per result
  score_threshold: 3        # minimum score to consider a result relevant (used by is_good_enough)
